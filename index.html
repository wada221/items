<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FREE ITEM</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#ff4db8,#ff99dd);
font-family:Arial,sans-serif;
text-align:center;
color:white;
}

h1{
padding-top:30px;
font-size:50px;
}

.menu{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:80px;
}

.btn{
background:white;
color:#ff1493;
width:220px;
padding:20px;
border-radius:20px;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.icon{
font-size:50px;
display:block;
margin-bottom:10px;
}

#overlay{
display:none;
position:fixed;
inset:0;
background:black;
z-index:9999;
}

#overlay video{
width:100%;
height:100%;
object-fit:cover;
}

.close{
position:absolute;
top:10px;
right:20px;
font-size:40px;
cursor:pointer;
z-index:10000;
}
</style>
</head>

<body>

<h1>🎁 FREE ITEM 🎁</h1>

<div class="menu">

<div class="btn" onclick="openVideo()">
<span class="icon">🎮</span>
ROBLOX
</div>

<div class="btn" onclick="openVideo()">
<span class="icon">🔥</span>
FREE FIRE
</div>

<div class="btn" onclick="openVideo()">
<span class="icon">⚔️</span>
LIÊN QUÂN
</div>

</div>

<div id="overlay">

<div class="close" onclick="closeVideo()">✖</div>

<video id="video" autoplay loop controls>
<source src="video.mp4" type="video/mp4">
</video>

</div>

<script>
function openVideo(){
const overlay=document.getElementById("overlay");
const video=document.getElementById("video");

overlay.style.display="block";
video.currentTime=0;
video.play();

if(document.documentElement.requestFullscreen){
document.documentElement.requestFullscreen().catch(()=>{});
}
}

function closeVideo(){
const overlay=document.getElementById("overlay");
const video=document.getElementById("video");

video.pause();
overlay.style.display="none";
}
</script>

</body>
</html>
