<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 FREE ITEM 🎁</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#ff4db8,#ff99dd);
text-align:center;
color:white;
}

h1{
font-size:55px;
margin-top:40px;
text-shadow:2px 2px 10px rgba(0,0,0,.3);
}

.menu{
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:25px;
margin-top:80px;
}

.btn{
background:white;
color:#ff1493;
width:230px;
padding:25px;
border-radius:25px;
font-size:28px;
font-weight:bold;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.2);
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.icon{
font-size:60px;
display:block;
margin-bottom:10px;
}

#overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999;
}

#overlay video{
width:100%;
height:100%;
object-fit:cover;
}

.close{
position:absolute;
top:10px;
right:20px;
font-size:50px;
font-weight:bold;
color:white;
cursor:pointer;
z-index:10000;
}
</style>
</head>

<body>

<h1>🎁 FREE ITEM 🎁</h1>

<div class="menu">

<div class="btn" onclick="openVideo()">
<span class="icon">🎮</span>
ROBLOX
</div>

<div class="btn" onclick="openVideo()">
<span class="icon">🔥</span>
FREE FIRE
</div>

<div class="btn" onclick="openVideo()">
<span class="icon">⚔️</span>
LIÊN QUÂN
</div>

</div>

<div id="overlay">

<div class="close" onclick="closeVideo()">✖</div>

<video id="video" autoplay loop controls playsinline>
<source src="https://files.catbox.moe/kfvtdb.mp4" type="video/mp4">
</video>

</div>

<script>
function openVideo(){
let overlay=document.getElementById("overlay");
let video=document.getElementById("video");

overlay.style.display="block";
video.currentTime=0;
video.play();

if(video.requestFullscreen){
video.requestFullscreen();
}
}

function closeVideo(){
let overlay=document.getElementById("overlay");
let video=document.getElementById("video");

video.pause();
overlay.style.display="none";
}
</script>

</body>
</html>
