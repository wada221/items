<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FREE ITEM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#ff4db8,#ff99dd);
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
    min-height:100vh;
}

h1{
    padding-top:40px;
    font-size:50px;
}

.menu{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:80px;
}

.btn{
    background:white;
    color:#ff1493;
    padding:20px 40px;
    border-radius:20px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
}

#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    z-index:9999;
}

#overlay video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:35px;
    color:white;
    cursor:pointer;
    z-index:10000;
}
</style>
</head>
<body>

<h1>🎁 FREE ITEM 🎁</h1>
